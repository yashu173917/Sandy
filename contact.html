<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sandy Pixelz — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg:     #0d0d0d;
      --gold:   #c9a84c;
      --white:  #f4f0ea;
      --muted:  #b8b4af;
      --border: rgba(201,168,76,.18);
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'Jost', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--sans);
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 100; opacity: .5;
    }

    /* NAVBAR */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 4rem;
      background: rgba(13,13,13,.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-logo {
      font-family: var(--serif); font-size: 1.5rem; font-weight: 600;
      letter-spacing: .04em; color: var(--white); text-decoration: none;
    }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 2.4rem; list-style: none; }
    .nav-links a {
      font-size: .78rem; letter-spacing: .15em; text-transform: uppercase;
      color: rgba(244,240,234,.75); text-decoration: none;
      position: relative; transition: color .3s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -.3rem; left: 0;
      width: 0; height: 1px; background: var(--gold); transition: width .3s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

    /* HERO */
    .contact-hero {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 6rem 2rem 2rem;
    }

    .contact-hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url('images/background_1.jpeg');
      background-size: cover;
      background-position: center;
      filter: blur(5px) brightness(0.4);
      transform: scale(1.05);
      z-index: 0;
    }

    .contact-hero::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(201,168,76,.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* GLASS CARD */
    .glass-card {
      position: relative; z-index: 2;
      display: flex;
      width: 100%;
      max-width: 1000px;
      height: calc(100vh - 8rem);
      max-height: 720px;
      border-radius: 2px;
      overflow: hidden;
      border: 1px solid rgba(201,168,76,.22);
      box-shadow: 0 32px 80px rgba(0,0,0,.7),
                  0 0 0 1px rgba(255,255,255,.04),
                  0 0 60px rgba(201,168,76,.08),
                  0 0 120px rgba(201,168,76,.04);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp .9s .3s forwards;
    }

    /* LEFT — image panel */
    .glass-image {
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }
    .glass-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: transform 10s ease;
      filter: brightness(0.92) contrast(1.05) saturate(0.9);
    }
    .glass-card:hover .glass-image img {
      transform: scale(1.08);
    }
    .glass-image-overlay {
      position: absolute; inset: 0;
      background:
        linear-gradient(to right, transparent 40%, rgba(13,13,13,.75) 100%),
        linear-gradient(to top, rgba(13,13,13,.7) 0%, transparent 40%),
        linear-gradient(to bottom, rgba(13,13,13,.3) 0%, transparent 30%);
    }
    .glass-image::after {
      content: '';
      position: absolute; top: 10%; left: 0;
      width: 1px; height: 80%;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      opacity: .4;
    }
    .glass-image-tag {
      position: absolute; bottom: 2rem; left: 2rem;
      font-size: .58rem; letter-spacing: .35em; text-transform: uppercase;
      color: var(--gold);
      display: flex; align-items: center; gap: .6rem;
    }
    .glass-image-tag::before {
      content: '';
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--gold);
      border-radius: 50%;
      opacity: .8;
    }

    /* RIGHT — form panel */
    .glass-form {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 2.5rem;
      background: rgba(13,13,13,.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid rgba(201,168,76,.12);
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .glass-form::-webkit-scrollbar {
      display: none;
    }

    /* TITLE FADE IN */
    .form-eyebrow {
      display: block;
      font-size: .65rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); margin-bottom: .8rem;
      opacity: 0;
      animation: fadeUp .6s .3s forwards;
    }
    .form-title {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 300; line-height: 1.15;
      color: var(--white); margin-bottom: .6rem;
      opacity: 0;
      animation: fadeUp .6s .4s forwards;
    }
    .form-title em { font-style: italic; color: var(--gold); }
    .form-divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 0 auto 1rem;
      opacity: 0;
      animation: fadeUp .6s .45s forwards;
    }

    /* CONTACT DETAILS */
    .contact-details {
      border-top: 1px solid rgba(201,168,76,.2);
      padding-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
      margin-top: .5rem;
    }

    /* STAGGERED FADE IN */
    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 1rem 1rem;
      border-bottom: 1px solid rgba(201,168,76,.1);
      transition: background .3s, padding-left .3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp .6s forwards;
    }
    .contact-item:last-child { border-bottom: none; }
    .contact-item:nth-child(1) { animation-delay: .5s; }
    .contact-item:nth-child(2) { animation-delay: .7s; }
    .contact-item:nth-child(3) { animation-delay: .9s; }
    .contact-item:nth-child(4) { animation-delay: 1.1s; }

    .contact-item::before {
      content: '';
      position: absolute; left: 0; top: 0;
      width: 2px; height: 100%;
      background: var(--gold);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform .3s ease;
    }
    .contact-item:hover::before {
      transform: scaleY(1);
      transform-origin: top;
    }
    .contact-item:hover {
      background: rgba(201,168,76,.06);
      padding-left: 1.8rem;
    }

    .contact-icon {
      width: 40px; height: 40px;
      border: 1px solid rgba(201,168,76,.3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color .3s, background .3s, transform .4s ease;
    }
    .contact-icon svg {
      width: 16px; height: 16px;
      stroke: var(--gold);
    }
    .contact-item:hover .contact-icon {
      border-color: var(--gold);
      background: rgba(201,168,76,.1);
      transform: rotate(8deg) scale(1.1);
    }

    .contact-info {
      display: flex; flex-direction: column; gap: .15rem;
      text-align: left;
      transition: transform .3s ease;
    }
    .contact-item:hover .contact-info {
      transform: translateY(-2px);
    }

    .contact-label {
      font-size: .58rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: .7;
      transition: opacity .3s, letter-spacing .3s;
    }
    .contact-item:hover .contact-label {
      opacity: 1;
      letter-spacing: .35em;
    }

    .contact-info span,
    .contact-info a {
      font-size: .88rem;
      color: var(--white);
      text-decoration: none;
      letter-spacing: .04em;
      transition: color .3s, letter-spacing .3s;
    }
    .contact-item:hover .contact-info a {
      color: var(--gold);
      letter-spacing: .07em;
    }

    /* KEYFRAMES */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: .7rem; letter-spacing: .08em; }
      .contact-hero {
        height: auto;
        min-height: 100vh;
        padding: 5rem 1rem 2rem;
      }
      .glass-card {
        flex-direction: column;
        height: auto;
        max-height: none;
      }
      .glass-image {
        flex: none;
        height: 35vh;
        width: 100%;
      }
      .glass-form {
        flex: 1;
        padding: 2rem 1.5rem;
        border-left: none;
        border-top: 1px solid rgba(201,168,76,.12);
      }
      .contact-item { padding: 1rem .8rem; }
      .form-title { font-size: 1.5rem; }
    }

    @media (max-width: 400px) {
      .glass-image { height: 25vh; }
      .glass-form { padding: 1.5rem 1rem; }
    }
  </style>
</head>
