<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sandy Pixelz — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg:     #0d0d0d;
      --gold:   #c9a84c;
      --white:  #f4f0ea;
      --muted:  #b8b4af;
      --border: rgba(201,168,76,.18);
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'Jost', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--sans);
      font-weight: 300;
      overflow-x: hidden;
    }

    /* NOISE */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 100; opacity: .5;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 4rem;
      background: rgba(13,13,13,.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-logo {
      font-family: var(--serif); font-size: 1.5rem; font-weight: 600;
      letter-spacing: .04em; color: var(--white); text-decoration: none;
    }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 2.4rem; list-style: none; }
    .nav-links a {
      font-size: .78rem; letter-spacing: .15em; text-transform: uppercase;
      color: rgba(244,240,234,.75); text-decoration: none;
      position: relative; transition: color .3s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -.3rem; left: 0;
      width: 0; height: 1px; background: var(--gold); transition: width .3s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

    /* ── HERO ── */
    .portfolio-hero {
      position: relative;
      height: 52vh; min-height: 340px;
      display: flex; align-items: flex-end;
      padding: 0 4rem 3.5rem;
      overflow: hidden;
    }

    /* Fixed blurred background for the entire page */
    .page-bg {
      position: fixed; inset: 0; z-index: -2;
      background-image: url('images/background_1.jpeg');
      background-size: cover; background-position: center;
      filter: blur(6px) brightness(0.35);
      transform: scale(1.04);
    }
    @media (max-width: 1024px) { .page-bg { background-image: url('images/background_2.jpeg'); } }
    @media (max-width: 768px)  { .page-bg { background-image: url('images/background_3.jpeg'); } }

    /* Dark overlay on top of blurred bg */
    .page-bg-overlay {
      position: fixed; inset: 0; z-index: -1;
      background: rgba(13,13,13,.55);
    }

    /* Same fixed bg as index */
    .portfolio-hero::before {
      display: none;
    }

    .portfolio-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(13,13,13,.45) 0%,
        rgba(13,13,13,.55) 50%,
        rgba(13,13,13,.97) 100%
      );
      z-index: 0;
    }
    .portfolio-hero-inner {
      position: relative; z-index: 1;
      opacity: 0; animation: fadeUp .8s .2s forwards;
    }
    .hero-eyebrow {
      font-size: .63rem; letter-spacing: .32em; text-transform: uppercase;
      color: var(--gold); margin-bottom: .7rem; display: block;
    }
    .hero-title {
      font-family: var(--serif);
      font-size: clamp(2.6rem, 5vw, 4.4rem);
      font-weight: 300; line-height: 1.05; color: var(--white);
    }
    .hero-title em { font-style: italic; color: var(--gold); }
    .hero-desc {
      font-size: .85rem; line-height: 1.8; color: var(--muted);
      max-width: 480px; margin-top: .9rem;
    }

    /* ── CATEGORY TABS ── */
    .tabs-wrap {
      position: sticky; top: 72px; z-index: 400;
      background: rgba(13,13,13,.75);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      padding: 0 4rem;
      display: flex; align-items: center; gap: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      font-family: var(--sans); font-size: .7rem;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--muted); background: none; border: none;
      padding: 1.2rem 1.6rem; cursor: pointer;
      position: relative; transition: color .3s;
    }
    .tab-btn::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--gold);
      transform: scaleX(0); transition: transform .3s;
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--white); }
    .tab-btn.active::after { transform: scaleX(1); }

    /* tab count badge */
    .tab-count {
      display: inline-block;
      font-size: .55rem; letter-spacing: .1em;
      color: var(--gold); margin-left: .4rem;
      opacity: .7;
    }

    /* ── GALLERY AREA ── */
    .gallery-wrap {
      padding: 3rem 4rem 6rem;
      min-height: 60vh;
      background: transparent;
    }

    /* category panel — hidden by default */
    .cat-panel { display: none; }
    .cat-panel.active { display: block; }

    /* Masonry-style grid using CSS columns */
    .gallery-grid {
      columns: 3;
      column-gap: 10px;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color .3s;
    }
    .gallery-item:hover { border-color: rgba(201,168,76,.3); }

    .gallery-item img {
      width: 100%; display: block;
      transition: transform .6s cubic-bezier(.25,.46,.45,.94), filter .4s;
      filter: brightness(0.92) saturate(0.9);
    }
    .gallery-item:hover img {
      transform: scale(1.05);
      filter: brightness(1) saturate(1);
    }

    /* hover overlay */
    .item-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(13,13,13,.85) 0%, transparent 55%);
      opacity: 0; transition: opacity .35s;
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 1.2rem 1rem;
    }
    .gallery-item:hover .item-overlay { opacity: 1; }
    .item-cat {
      font-size: .58rem; letter-spacing: .25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: .25rem;
    }
    .item-label {
      font-family: var(--serif); font-size: 1rem;
      font-weight: 300; color: var(--white);
    }

    /* view icon */
    .item-view-icon {
      position: absolute; top: 1rem; right: 1rem;
      width: 32px; height: 32px;
      border: 1px solid rgba(201,168,76,.5); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(.8);
      transition: opacity .3s, transform .3s;
      color: var(--gold);
    }
    .gallery-item:hover .item-view-icon { opacity: 1; transform: scale(1); }

    /* placeholder cell (no image yet) */
    .gallery-item.placeholder {
      background: rgba(20,20,20,.55);
      aspect-ratio: 3/4;
      display: flex; align-items: center; justify-content: center;
    }
    .gallery-item.placeholder.wide { aspect-ratio: 4/3; }
    .gallery-item.placeholder.square { aspect-ratio: 1; }
    .placeholder-inner {
      display: flex; flex-direction: column; align-items: center; gap: .5rem;
      opacity: .22;
    }
    .placeholder-inner svg { width: 28px; height: 28px; color: var(--gold); }
    .placeholder-inner span {
      font-size: .58rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted);
    }

    /* empty state */
    .empty-state {
      text-align: center; padding: 5rem 2rem;
      display: none;
    }
    .empty-state.visible { display: block; }
    .empty-state p {
      font-family: var(--serif); font-size: 1.4rem; font-weight: 300;
      color: var(--muted); font-style: italic;
    }

    /* ── FULLSCREEN VIEWER ── */
    .viewer {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(8,8,8,.97);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .4s;
    }
    .viewer.open { opacity: 1; pointer-events: all; }

    .viewer-img-wrap {
      position: relative;
      max-width: 90vw; max-height: 88vh;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer-img-wrap img {
      max-width: 90vw; max-height: 85vh;
      object-fit: contain; display: block;
      border: 1px solid rgba(201,168,76,.15);
      box-shadow: 0 32px 80px rgba(0,0,0,.8);
      transform: scale(.94); transition: transform .4s cubic-bezier(.25,.46,.45,.94);
    }
    .viewer.open .viewer-img-wrap img { transform: scale(1); }

    /* viewer meta */
    .viewer-meta {
      position: absolute; bottom: -3rem; left: 0;
      display: flex; align-items: center; gap: 1rem;
      opacity: 0; transition: opacity .4s .2s;
    }
    .viewer.open .viewer-meta { opacity: 1; }
    .viewer-cat {
      font-size: .6rem; letter-spacing: .28em; text-transform: uppercase; color: var(--gold);
    }
    .viewer-label {
      font-family: var(--serif); font-size: 1rem; font-weight: 300; color: var(--muted);
    }

    /* close button */
    .viewer-close {
      position: absolute; top: 1.4rem; right: 1.8rem;
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(201,168,76,.35); background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--white); transition: border-color .3s, background .3s;
    }
    .viewer-close:hover { border-color: var(--gold); background: rgba(201,168,76,.08); }

    /* prev / next */
    .viewer-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(201,168,76,.25); background: rgba(13,13,13,.6);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--white); transition: border-color .3s, background .3s;
    }
    .viewer-nav:hover { border-color: var(--gold); background: rgba(201,168,76,.1); }
    .viewer-prev { left: -3.5rem; }
    .viewer-next { right: -3.5rem; }

    /* counter */
    .viewer-counter {
      position: absolute; bottom: 1.4rem; left: 50%; transform: translateX(-50%);
      font-size: .6rem; letter-spacing: .2em; color: var(--muted);
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      .gallery-grid { columns: 2; }
    }
    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: .7rem; letter-spacing: .08em; }
      .portfolio-hero { padding: 0 1.5rem 3rem; }
      .tabs-wrap { padding: 0 1rem; }
      .tab-btn { padding: 1rem .9rem; font-size: .65rem; }
      .gallery-wrap { padding: 2rem 1rem 4rem; }
      .gallery-grid { columns: 2; column-gap: 6px; }
      .gallery-item { margin-bottom: 6px; }
      .viewer-prev { left: -.8rem; }
      .viewer-next { right: -.8rem; }
      .viewer-nav { width: 36px; height: 36px; }
    }
    @media (max-width: 480px) {
      .gallery-grid { columns: 1; }
    }
  </style>
</head>
<body>

  <!-- Fixed blurred page background -->
  <div class="page-bg"></div>
  <div class="page-bg-overlay"></div>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="nav-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:.5rem; vertical-align:middle; margin-bottom:.15rem;">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Sandy <span>Pixelz</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="portfolio.html" class="active">Portfolio</a></li>
      <li><a href="packages.html">Packages</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- ── HERO ── -->
  <section class="portfolio-hero">
    <div class="portfolio-hero-overlay"></div>
    <div class="portfolio-hero-inner">
      <span class="hero-eyebrow">Our Work</span>
      <h1 class="hero-title">Stories We've <em>Told</em></h1>
      <p class="hero-desc">
        Every image in this collection is a moment that happened exactly once.
        Browse by category and step into the stories we've had the privilege to preserve.
      </p>
    </div>
  </section>

  <!-- ── CATEGORY TABS ── -->
  <div class="tabs-wrap" id="tabsWrap">
    <button class="tab-btn active" data-cat="all">All <span class="tab-count" id="count-all"></span></button>
    <button class="tab-btn" data-cat="weddings">Weddings <span class="tab-count" id="count-weddings"></span></button>
    <button class="tab-btn" data-cat="pre-wedding">Pre-Wedding <span class="tab-count" id="count-pre-wedding"></span></button>
    <button class="tab-btn" data-cat="family">Family <span class="tab-count" id="count-family"></span></button>
    <button class="tab-btn" data-cat="newborn">Newborn <span class="tab-count" id="count-newborn"></span></button>
    <button class="tab-btn" data-cat="portraits">Portraits <span class="tab-count" id="count-portraits"></span></button>
    <button class="tab-btn" data-cat="events">Events <span class="tab-count" id="count-events"></span></button>
  </div>

  <!-- ── GALLERY ── -->
  <div class="gallery-wrap">
    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="empty-state" id="emptyState">
      <p>Images coming soon…</p>
    </div>
  </div>

  <!-- ── FULLSCREEN VIEWER ── -->
  <div class="viewer" id="viewer">
    <button class="viewer-close" id="viewerClose" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <div class="viewer-img-wrap" id="viewerImgWrap">
      <button class="viewer-nav viewer-prev" id="viewerPrev" aria-label="Previous">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <img src="" alt="" id="viewerImg"/>

      <button class="viewer-nav viewer-next" id="viewerNext" aria-label="Next">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <div class="viewer-meta">
        <span class="viewer-cat" id="viewerCat"></span>
        <span class="viewer-label" id="viewerLabel"></span>
      </div>
    </div>

    <div class="viewer-counter" id="viewerCounter"></div>
  </div>

  <script>
    window.history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);

    /* ── DATA ──────────────────────────────────────────
       Each entry: { cat, src, label, ratio }
       ratio: 'tall' | 'wide' | 'square'
       src: real image path OR null for placeholder
    ─────────────────────────────────────────────────── */
    const DATA = [
      // WEDDINGS
      { cat:'weddings',    src: 'images/wedding.jpeg',  label:'Sacred Vows',          ratio:'tall'   },
      { cat:'weddings',    src: null,                   label:'Golden Hour Ceremony',  ratio:'wide'   },
      { cat:'weddings',    src: null,                   label:'The First Dance',       ratio:'tall'   },
      { cat:'weddings',    src: null,                   label:'Together Forever',      ratio:'square' },
      { cat:'weddings',    src: null,                   label:'Ring Exchange',         ratio:'tall'   },
      { cat:'weddings',    src: null,                   label:'Bridal Portraits',      ratio:'wide'   },

      // PRE-WEDDING
      { cat:'pre-wedding', src: null,                   label:'Love in the Golden Hour', ratio:'tall' },
      { cat:'pre-wedding', src: null,                   label:'City Lights',           ratio:'wide'   },
      { cat:'pre-wedding', src: null,                   label:'Stolen Glances',        ratio:'tall'   },
      { cat:'pre-wedding', src: null,                   label:'Rooftop Dreams',        ratio:'square' },
      { cat:'pre-wedding', src: null,                   label:'Rain & Romance',        ratio:'tall'   },
      { cat:'pre-wedding', src: null,                   label:'Garden Waltz',          ratio:'wide'   },

      // FAMILY
      { cat:'family',      src: 'images/family.jpeg',   label:'Together',              ratio:'wide'   },
      { cat:'family',      src: null,                   label:'Sunday Afternoon',      ratio:'tall'   },
      { cat:'family',      src: null,                   label:'Home',                  ratio:'square' },
      { cat:'family',      src: null,                   label:'Generations',           ratio:'tall'   },
      { cat:'family',      src: null,                   label:'Backyard Stories',      ratio:'wide'   },

      // NEWBORN
      { cat:'newborn',     src: 'images/newborn.jpeg',  label:'Ten Tiny Fingers',      ratio:'tall'   },
      { cat:'newborn',     src: null,                   label:'Dreaming Already',      ratio:'square' },
      { cat:'newborn',     src: null,                   label:'Pure & New',            ratio:'tall'   },
      { cat:'newborn',     src: null,                   label:'Wrapped in Love',       ratio:'wide'   },
      { cat:'newborn',     src: null,                   label:'First Light',           ratio:'tall'   },

      // PORTRAITS
      { cat:'portraits',   src: 'images/portraits.jpeg',label:'You, Seen',             ratio:'tall'   },
      { cat:'portraits',   src: null,                   label:'Quiet Confidence',      ratio:'square' },
      { cat:'portraits',   src: null,                   label:'Golden Light',          ratio:'tall'   },
      { cat:'portraits',   src: null,                   label:'Inner World',           ratio:'wide'   },
      { cat:'portraits',   src: null,                   label:'Unscripted',            ratio:'tall'   },

      // EVENTS
      { cat:'events',      src: 'images/events.jpeg',   label:'The Celebration',       ratio:'wide'   },
      { cat:'events',      src: null,                   label:'Every Milestone',       ratio:'tall'   },
      { cat:'events',      src: null,                   label:'Joy Uncontained',       ratio:'square' },
      { cat:'events',      src: null,                   label:'Mark the Moment',       ratio:'tall'   },
      { cat:'events',      src: null,                   label:'Raise a Glass',         ratio:'wide'   },
    ];

    /* ── BUILD GRID ─────────────────────────────────── */
    const grid      = document.getElementById('galleryGrid');
    const emptyState = document.getElementById('emptyState');

    const camIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/></svg>`;

    const viewIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`;

    function buildGrid(cat) {
      grid.innerHTML = '';
      const items = cat === 'all' ? DATA : DATA.filter(d => d.cat === cat);

      if (items.length === 0) { emptyState.classList.add('visible'); return; }
      emptyState.classList.remove('visible');

      items.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'gallery-item' + (item.src ? '' : ` placeholder ${item.ratio}`);
        el.dataset.index = i;
        el.dataset.cat   = item.cat;
        el.dataset.label = item.label;
        el.dataset.src   = item.src || '';

        if (item.src) {
          el.innerHTML = `
            <img src="${item.src}" alt="${item.label}" loading="lazy"/>
            <div class="item-overlay">
              <span class="item-cat">${item.cat.replace('-', ' ')}</span>
              <span class="item-label">${item.label}</span>
            </div>
            <div class="item-view-icon">${viewIcon}</div>`;
        } else {
          el.innerHTML = `
            <div class="placeholder-inner">
              ${camIcon}
              <span>${item.label}</span>
            </div>
            <div class="item-overlay">
              <span class="item-cat">${item.cat.replace('-', ' ')}</span>
              <span class="item-label">${item.label}</span>
            </div>`;
        }

        el.addEventListener('click', () => openViewer(items, i));
        grid.appendChild(el);
      });
    }

    /* ── TABS ─────────────────────────────────────── */
    // populate counts
    const cats = ['all','weddings','pre-wedding','family','newborn','portraits','events'];
    cats.forEach(c => {
      const count = c === 'all' ? DATA.length : DATA.filter(d => d.cat === c).length;
      const el = document.getElementById('count-' + c);
      if (el) el.textContent = count;
    });

    let currentCat = 'all';
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        buildGrid(currentCat);
        // smooth scroll to grid
        grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    buildGrid('all');

    /* ── FULLSCREEN VIEWER ────────────────────────── */
    const viewer      = document.getElementById('viewer');
    const viewerImg   = document.getElementById('viewerImg');
    const viewerCat   = document.getElementById('viewerCat');
    const viewerLabel = document.getElementById('viewerLabel');
    const viewerCount = document.getElementById('viewerCounter');
    const viewerClose = document.getElementById('viewerClose');
    const viewerPrev  = document.getElementById('viewerPrev');
    const viewerNext  = document.getElementById('viewerNext');

    let viewerItems = [];
    let viewerIdx   = 0;

    function openViewer(items, idx) {
      // only open for items with real images
      const realItems = items.filter(i => i.src);
      const realIdx   = realItems.indexOf(items[idx]);
      if (realIdx === -1) return; // placeholder — no viewer

      viewerItems = realItems;
      viewerIdx   = realIdx;
      renderViewer();
      viewer.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function renderViewer() {
      const item = viewerItems[viewerIdx];
      viewerImg.src       = item.src;
      viewerImg.alt       = item.label;
      viewerCat.textContent   = item.cat.replace('-', ' ');
      viewerLabel.textContent = item.label;
      viewerCount.textContent = `${viewerIdx + 1} / ${viewerItems.length}`;
      viewerPrev.style.display = viewerItems.length < 2 ? 'none' : '';
      viewerNext.style.display = viewerItems.length < 2 ? 'none' : '';
    }

    function closeViewer() {
      viewer.classList.remove('open');
      document.body.style.overflow = '';
    }

    viewerClose.addEventListener('click', closeViewer);
    viewer.addEventListener('click', e => { if (e.target === viewer) closeViewer(); });

    viewerPrev.addEventListener('click', e => {
      e.stopPropagation();
      viewerIdx = (viewerIdx - 1 + viewerItems.length) % viewerItems.length;
      renderViewer();
    });
    viewerNext.addEventListener('click', e => {
      e.stopPropagation();
      viewerIdx = (viewerIdx + 1) % viewerItems.length;
      renderViewer();
    });

    document.addEventListener('keydown', e => {
      if (!viewer.classList.contains('open')) return;
      if (e.key === 'Escape')      closeViewer();
      if (e.key === 'ArrowLeft')  { viewerIdx = (viewerIdx - 1 + viewerItems.length) % viewerItems.length; renderViewer(); }
      if (e.key === 'ArrowRight') { viewerIdx = (viewerIdx + 1) % viewerItems.length; renderViewer(); }
    });

    // Touch swipe for viewer
    let touchStartX = 0;
    viewer.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    viewer.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) < 40) return;
      if (dx < 0) { viewerIdx = (viewerIdx + 1) % viewerItems.length; }
      else        { viewerIdx = (viewerIdx - 1 + viewerItems.length) % viewerItems.length; }
      renderViewer();
    }, { passive: true });
  </script>

</body>
</html>
